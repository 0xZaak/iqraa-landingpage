#The name of the release
name: Release v1.0.5
#Declaring the branches and tags
on:
  push:
    branches:
      - "main"
#Declaring all jobs and flows
jobs:
  release:
    name: Release v1.0.5
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      #Checkout Code
      - name: Checkout code
        uses: actions/checkout@v3

      #Create New Release
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        with:
          tag_name: v1.0.5
          release_name: Iqraa v1.0.5
          body: |
            Changes in this Release:
              - [New] Release new version v1.0.5
              - [Update] Added final release date
          draft: false
          prerelease: false